<!doctype html>
<html lang="my">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shar Pone Taw - ကျန်းမာရေးဆောင်းပါးများ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;600;700&family=Noto+Sans+Myanmar:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/news.css" />
  </head>
  <body>
    <div class="mobile-container">
      <div class="news-header">
        <a href="homepage.html" class="back-btn"> <i class="fa-solid fa-chevron-left"></i> နောက်သို့ </a>
        <h2>ဆောင်းပါးများ</h2>
        <div style="width: 40px"></div>
      </div>

      <div class="news-content">
        <div id="news-container"></div>
      </div>

      <div id="news-detail-modal" class="news-modal" style="display: none">
        <div class="news-modal-card">
          <h3 id="modal-title">ဆောင်းပါးခေါင်းစဉ်</h3>
          <p id="modal-author" class="modal-author">ဆရာဝန်အမည် • ရက်စွဲ</p>
          <div class="modal-divider"></div>
          <p id="modal-body" class="modal-body">အသေးစိတ် အကြောင်းအရာများ...</p>
          <button class="close-news-btn" onclick="closeNewsDetail()">ဖတ်ပြီးပါပြီ</button>
        </div>
      </div>

      <!--Nav bottom-->
       <div class="menu-container">
          <div class="menu">

            <a href="booking_hospital.html" class="nav-item" data-view="news-view" title="ဆောင်းပါး" style="text-decoration: none">
             <i class="fa-solid fa-hospital"></i><span>ဆေးရုံများ</span>
            </a>

            <a href="news.html" class="nav-item active" data-view="news-view" title="ဆောင်းပါး" style="text-decoration: none">
              <i class="fa-solid fa-newspaper"></i> <span>ဆောင်းပါး</span>
            </a>

            <a href="homepage.html" class="nav-item " data-view="home-view" title="အိမ်">
              <i class="fa-solid fa-house"></i>
              <span>အိမ်</span>
            </a>    

            <a href="ai_doctor.html" class="nav-item" data-view="doctors-view" title="ဒေါက်တာ"> <i class="fa-solid fa-stethoscope"></i> <span>ဒေါက်တာ</span> </a>

            <a href="booking_list.html" class="nav-item" data-view="booking-history-view" title="မှတ်တမ်း" style="text-decoration: none">
              <i class="fa-solid fa-calendar-days"></i> <span>မှတ်တမ်း</span>
            </a>
          </div>
        </div>
    </div>

    <script src="../js/global_doctor_notification.js"></script>
    <script src="../js/news_db.js"></script>
    <script>
      // ဆောင်းပါးများကို UI ပေါ်တွင် Card ပုံစံဖြင့် Render လုပ်ပေးမည့် ဖန်ရှင်
      function renderNewsList() {
        const newsContainer = document.getElementById("news-container");
        if (!newsContainer || typeof news_db === "undefined") return;

        newsContainer.innerHTML = news_db
          .map(
            (news) => `
                <div class="news-card" onclick="openNewsDetail(${news.id})">
                    <img src="${news.image_url}" alt="News Image" class="news-img" />
                    <div class="news-info">
                        <span class="news-cat">${news.category}</span>
                        <h3 class="news-title">${news.title}</h3>
                        <p class="news-meta"><i class="fa-solid fa-eye"></i> ${news.reads} ဖတ်ရှုသူ</p>
                    </div>
                </div>
            `,
          )
          .join("");
      }

      // ကတ်တစ်ခုခုကို နှိပ်လျှင် Detail Popup ဖွင့်ပေးမည့် ဖန်ရှင်
      function openNewsDetail(id) {
        const news = news_db.find((item) => item.id === id);
        if (!news) return;

        document.getElementById("modal-title").innerText = news.title;
        document.getElementById("modal-author").innerText = `${news.author} • ${news.publish_date}`;
        document.getElementById("modal-body").innerText = news.detail_content;

        document.getElementById("news-detail-modal").style.display = "flex";
      }

      // Popup ပြန်ပိတ်ပေးမည့် ဖန်ရှင်
      function closeNewsDetail() {
        document.getElementById("news-detail-modal").style.display = "none";
      }

      // Page စဖွင့်တာနဲ့ စာရင်းထုတ်ခိုင်းခြင်း
      document.addEventListener("DOMContentLoaded", renderNewsList);
    </script>
  </body>
</html>
