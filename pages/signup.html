<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Doctor App - Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/signup.css">
</head>
<body>

    <div class="mobile-container">
        <div class="top-gradient">
            <a href="login.html" class="back-btn">
                <i class="fa-solid fa-chevron-left"></i> နောက်သို့
            </a>
        </div>

        <div class="form-card">
            <h2>စတင်မည်</h2>
            
            <form action="#">
                <div class="input-group">
                    <label>နာမည်</label>
                    <input type="text"  required>
                </div>

                <div class="input-group">
                    <label>ဖုန်းနံပါတ်</label>
                    <input type="tel"  required>
                </div>

                <div class="input-group">
                    <label>စကားဝှက်</label>
                    <input type="password"  required>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms"><span>စည်းကမ်းချက်များကို သဘောတူညီပါသည်</span></label>
                </div>

                <button type="submit" class="btn-submit">အကောင့်ဖွင့်မည်</button>
            </form>

            <div class="divider">အကောင့်ဝင်မည်</div>

            <div class="social-group">
                <a href="#" class="social-icon fb"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" class="social-icon tw"><i class="fa-brands fa-twitter"></i></a>
                <a href="#" class="social-icon gg"><i class="fa-brands fa-google"></i></a>
                <a href="#" class="social-icon ap"><i class="fa-brands fa-apple"></i></a>
            </div>

            <div class="bottom-text">
                အကောင့် ရှိလျှင် <a href="/index.html">အကောင့်ဝင်မည်</a>
            </div>
        </div>
    </div>

</body>
</html>
