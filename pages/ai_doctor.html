      function safeText(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function getJSON(key) {
        try {
          return JSON.parse(localStorage.getItem(key));
        } catch (error) {
          return null;
        }
      }

      function saveJSON(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      function normalizeText(text) {
        return String(text || "")
          .toLowerCase()
          .replace(/[၊။,.!?;:(){}\[\]"']/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function detectBestCategory(inputText) {
        const text = normalizeText(inputText);
        let bestMatch = null;

        DOCTOR_CATEGORY_KEYWORDS.forEach((group) => {
          let score = 0;

          group.keywords.forEach((keyword) => {
            const key = normalizeText(keyword);

            if (text.includes(key)) {
              score += key.length > 5 ? 3 : 1;
            }
          });

          if (!bestMatch || score > bestMatch.score) {
            bestMatch = {
              category: group.category,
              score: score,
            };
          }
        });

        if (!bestMatch || bestMatch.score <= 0) return null;

        return bestMatch.category;
      }

      function getSlotDateTime(slot) {
        return new Date(`${slot.date}T${slot.time}:00`);
      }

      function getNearestAvailableSlot(doctor) {
        if (!doctor.available_slots || doctor.available_slots.length === 0) {
          return null;
        }

        const now = new Date();

        const sortedSlots = doctor.available_slots
          .map((slot) => ({
            ...slot,
            dateTime: getSlotDateTime(slot),
          }))
          .sort((a, b) => a.dateTime - b.dateTime);

        const futureSlot = sortedSlots.find((slot) => slot.dateTime >= now);

        return futureSlot || sortedSlots[0];
      }

      function findBestDoctorByCategory(category) {
        if (typeof doctors_db === "undefined") return null;

        const matchedDoctors = doctors_db.filter((doctor) => {
          return doctor.category === category;
        });

        if (matchedDoctors.length === 0) return null;

        const now = new Date();

        const rankedDoctors = matchedDoctors
          .map((doctor) => {
            const nearestSlot = getNearestAvailableSlot(doctor);
            const slotTime = nearestSlot ? getSlotDateTime(nearestSlot) : null;

            return {
              doctor,
              nearestSlot,
              timeDifference: slotTime ? Math.abs(slotTime - now) : Number.MAX_SAFE_INTEGER,
            };
          })
          .sort((a, b) => {
            if (a.timeDifference !== b.timeDifference) {
              return a.timeDifference - b.timeDifference;
            }

            return Number(b.doctor.rating || 0) - Number(a.doctor.rating || 0);
          });

        return rankedDoctors[0];
      }

      function formatSlot(slot) {
        if (!slot) return "အချိန်မရှိသေးပါ";
        return `${slot.date} / ${slot.time}`;
      }

      function getSlotDate(slot) {
        return slot && slot.date ? slot.date : "ရက် မသတ်မှတ်ရသေးပါ";
      }

      function getSlotTime(slot) {
        return slot && slot.time ? slot.time : "အချိန် မသတ်မှတ်ရသေးပါ";

          const elapsedSeconds = Math.floor((Date.now() - aiCallState.startedAt) / 1000);
          const remainingSeconds = Math.max(AI_CALL_DURATION_SECONDS - elapsedSeconds, 0);

          const minutes = String(Math.floor(remainingSeconds / 60)).padStart(2, "0");
          const seconds = String(remainingSeconds % 60).padStart(2, "0");

          if (timerBox) {
            timerBox.innerText = `${minutes}:${seconds}`;

          if (remainingSeconds <= 0) {

        updateCountdownTimer();

          </button>

          <p class="empty-card-text" data-appointment-enter-note style="margin-top: 10px; font-size: 12px;">
            ${isReady ? "ဆရာဝန်နဲ့ ချိန်းဆိုထားတာ နီးကပ်လာလို့ ကြိုတင်ဝင်ရောက်နိုင်ပါပြီ" : "ယခုလက်ရှိ ဒီ ခလုတ်ကို အသုံးပြု၍ မရသေးပါ"}
          </p>
        </div>
      </div>
    </div>
  `;

        if (isReady) {
          activateAppointmentEnterButton();
        } else {
          scheduleAiDoctorEnterButtonTimer(resultData);
        }
      }

      function renderDoctorHistory() {
        const historyList = document.getElementById("doctorHistoryList");

        if (!historyList) return;

        const history = getAiDoctorHistory();

        if (history.length === 0) {
          historyList.innerHTML = `
      <div class="history-empty-card">
        မှတ်တမ်းများ မရှိသေးပါ
      </div>
    `;
          return;
        }

        historyList.innerHTML = history
          .map((record) => {
            return `
        <div class="doctor-history-card" onclick="openHistorySummaryModal('${safeText(record.id)}')">
          <button
            type="button"
            class="history-delete-btn"
            onclick="deleteDoctorHistory(event, '${safeText(record.id)}')"
          >
            <i class="fa-solid fa-trash"></i>
          </button>

          <div class="history-doctor-icon">
            <i class="fa-solid fa-user-doctor"></i>
          </div>

          <div class="history-card-content">

  <h4>${safeText(record.recordTitleMm || "ဆေးကုသမှု မှတ်တမ်း")}</h4>

  <p><b>Doctor's Name:</b> ${safeText(record.doctorName)}</p>
  <p><b>Diagnosed Illness:</b> ${safeText(record.illnessDiagnosed)}</p>
  <p><b>Specialist:</b> ${safeText(record.doctorCategory)}</p>

  <span>${safeText(record.consultationDate)}</span>
</div>

        </div>
      `;
          })
          .join("");
      }

      function deleteDoctorHistory(event, historyId) {
        event.stopPropagation();

        const history = getAiDoctorHistory();
        const updatedHistory = history.filter((record) => record.id !== historyId);

        saveAiDoctorHistory(updatedHistory);
        renderDoctorHistory();
      }

      function openHistorySummaryModal(historyId) {
        const history = getAiDoctorHistory();
        const record = history.find((item) => item.id === historyId);

        if (!record) return;

        const modal = document.getElementById("historySummaryModal");
        const modalContent = document.getElementById("historySummaryModalContent");

        if (!modal || !modalContent) return;

        modalContent.innerHTML = `
    <div class="history-modal-header">
      <div class="history-doctor-icon large">
        <i class="fa-solid fa-file-medical"></i>
      </div>

      <div>
        <h3>${safeText(record.recordTitleMm || "ဆေးကုသမှု မှတ်တမ်း")}</h3>
      </div>
    </div>

    <div class="history-modal-info">
      <p><b>Doctor's Name:</b> ${safeText(record.doctorName)}</p>
      <p><b>Specialist:</b> ${safeText(record.doctorCategory)}</p>
      <p><b>Clinic:</b> ${safeText(record.clinic)}</p>
      <p><b>Diagnosed Illness:</b> ${safeText(record.illnessDiagnosed)}</p>
      <p><b>Patient Symptoms:</b> ${safeText(record.patientSymptoms)}</p>
      <p><b>Date:</b> ${safeText(record.consultationDate)}</p>
    </div>

    <div class="history-summary-box">
      <h4>Summary / Transcript</h4>
      <p>${safeText(record.conversationSummary)}</p>
    </div>

    <div class="history-summary-box doctor-note-box">
      <h4>Doctor's Notes</h4>
      <h5>ဆရာဝန် မှတ်ချက်</h5>
      <p>${safeText(record.doctorNotes)}</p>
    </div>
  `;

        modal.classList.add("show");
      }

      function closeHistorySummaryModal() {
        const modal = document.getElementById("historySummaryModal");

        if (modal) {
          modal.classList.remove("show");
        }
      }

      function syncActiveBookingState(resultData) {
        if (!resultData || !resultData.doctor) return null;

        const activeStatuses = ["waiting", "ready", "in_call"];

        if (!activeStatuses.includes(resultData.bookingStatus)) {
          return resultData;
        }

        const globalAppointment = getActiveGlobalAppointment();
        const notifyAt = Number(resultData.notifyAt || globalAppointment?.notifyAt);

        const isGlobalReady = globalAppointment && (globalAppointment.status === "ready" || globalAppointment.canJoin === true);

        const isTimeReady = notifyAt && Date.now() >= notifyAt;

        if (resultData.bookingStatus === "waiting" && (isTimeReady || isGlobalReady)) {
          const updatedResult = {
            ...resultData,
            bookingStatus: "ready",
            canJoin: true,
            readyAt: resultData.readyAt || new Date().toLocaleString(),
          };

          saveJSON(AI_DOCTOR_RESULT_KEY, updatedResult);

          if (globalAppointment) {
            const updatedGlobalAppointment = {
              ...globalAppointment,
              status: "ready",
              canJoin: true,
              readyAt: globalAppointment.readyAt || Date.now(),
            };

            localStorage.setItem("globalAppointmentAlert", JSON.stringify(updatedGlobalAppointment));
          }

          return updatedResult;
        }

        return resultData;
      }

      function runAiDoctorSearch() {
        const requestData = getJSON(AI_DOCTOR_REQUEST_KEY);
        let oldResult = getJSON(AI_DOCTOR_RESULT_KEY);

        const activeBookingStatuses = ["waiting", "ready", "in_call"];

        if (oldResult && oldResult.doctor && activeBookingStatuses.includes(oldResult.bookingStatus)) {
          oldResult = syncActiveBookingState(oldResult);

          renderBookingNotificationCard(oldResult);
          return;
        }

        if (oldResult && oldResult.status === "found" && oldResult.doctor) {
          renderDoctorResult(oldResult);
          return;
        }

        if (!requestData) {
          renderEmptyDoctorView();
          return;
        }

        const fullPatientText = getPatientSearchText(requestData);
        const matchedCategory = detectBestCategory(fullPatientText);

        if (!matchedCategory) {
          const notFoundResult = {
            status: "not_found",
            patient: requestData,
            matchedCategory: null,
            doctor: null,
            nearestSlot: null,
            searchedAt: new Date().toLocaleString(),
          };

          saveJSON(AI_DOCTOR_RESULT_KEY, notFoundResult);
          renderNotFoundView();
          return;
        }

        const bestDoctorResult = findBestDoctorByCategory(matchedCategory);

        if (!bestDoctorResult || !bestDoctorResult.doctor) {
          const notFoundResult = {
            status: "not_found",
            patient: requestData,
            matchedCategory: matchedCategory,
            doctor: null,
            nearestSlot: null,
            searchedAt: new Date().toLocaleString(),
          };

          saveJSON(AI_DOCTOR_RESULT_KEY, notFoundResult);
          renderNotFoundView();
          return;
        }

        const finalResult = {
          status: "found",
          patient: requestData,
          matchedCategory: matchedCategory,
          doctor: bestDoctorResult.doctor,
          nearestSlot: bestDoctorResult.nearestSlot,
          searchedAt: new Date().toLocaleString(),
        };

        saveJSON(AI_DOCTOR_RESULT_KEY, finalResult);
        renderDoctorResult(finalResult);
      }

      function bookMatchedDoctor() {
        const resultData = getJSON(AI_DOCTOR_RESULT_KEY);

        if (!resultData || !resultData.doctor) {
          alert("Doctor information မတွေ့ပါ။");
          return;
        }

        const doctor = resultData.doctor;
        const nearestSlot = resultData.nearestSlot;

        const bookingDate = getSlotDate(nearestSlot);
        const bookingTime = getSlotTime(nearestSlot);

        const appointmentId = `ai_booking_${Date.now()}`;
        const notifyAt = Date.now() + 10000;

        const bookedResult = {
          ...resultData,
          appointmentId: appointmentId,
          bookingStatus: "waiting",
          canJoin: false,
          notifyAt: notifyAt,
          bookedAt: new Date().toLocaleString(),
        };

        saveJSON(AI_DOCTOR_RESULT_KEY, bookedResult);
        localStorage.setItem(MEDICAL_FORM_LOCK_KEY, "true");
        renderBookingNotificationCard(bookedResult);

        if (window.GlobalAppointmentAlert) {
          window.GlobalAppointmentAlert.create({
            id: appointmentId,
            doctorId: doctor.id,
            doctorName: doctor.name,
            date: bookingDate,
            time: bookingTime,
            joinUrl: `doctor_call.html?doctor_id=${doctor.id}`,
          });
        }

        scheduleAiDoctorEnterButtonTimer(bookedResult);
      }

      document.addEventListener("DOMContentLoaded", () => {
        runAiDoctorSearch();
        renderDoctorHistory();
      });
    </script>
  </body>
</html>
